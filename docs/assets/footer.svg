<svg viewBox="0 0 700 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#07051a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&amp;display=swap');
      .line1 {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        fill: #8f9bff;
        text-anchor: middle;
        animation: pulse 3s ease-in-out infinite;
      }
      .line2 {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 15px;
        font-style: italic;
        fill: #e0e8ff;
        text-anchor: middle;
        filter: url(#glow);
        animation: pulse 3s ease-in-out infinite reverse;
      }
      .cursor {
        fill: #4fd5ff;
        animation: blink 1.1s steps(1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50%       { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="700" height="90" fill="url(#bg)" rx="8"/>

  <!-- línea separadora top -->
  <line x1="60" y1="12" x2="640" y2="12" stroke="#3dd8ff" stroke-width="0.4" opacity="0.3"/>

  <text x="350" y="42" class="line1">LaRedNoSoloDescribeLoFisico := LoFisicoTambienOcurreComoRed.</text>
  <text x="350" y="68" class="line2">El socket sigue abierto.<tspan class="cursor">▊</tspan></text>

  <!-- línea separadora bottom -->
  <line x1="60" y1="80" x2="640" y2="80" stroke="#a060ff" stroke-width="0.4" opacity="0.3"/>
</svg>
